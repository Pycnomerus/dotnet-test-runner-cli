name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/DotnetTestRunnerCli/DotnetTestRunnerCli.csproj
          -c Release
          --nologo
          -o out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-runner-cli-linux-x64
          path: out/dotnet-test-runner-cli
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/dotnet-test-runner-cli
          token: ${{ secrets.GITHUB_TOKEN }}
