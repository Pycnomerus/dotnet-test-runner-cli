name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/DotnetTestRunnerCli/DotnetTestRunnerCli.csproj
          -c Release
          --nologo
          -o out/

      - name: Package tarball
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCHIVE="dotnet-test-runner-cli-${VERSION}-linux-x64.tar.gz"
          tar -czf "$ARCHIVE" -C out dotnet-test-runner-cli
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-runner-cli-linux-x64
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
